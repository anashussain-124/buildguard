name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install sentry-sdk upstash-redis pymupdf langdetect
      - name: Run backend tests
        working-directory: backend
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          ENVIRONMENT: test
        run: |
          pytest -q
      - name: Run dependency security audit
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt --strict
        continue-on-error: true

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install frontend deps
        working-directory: frontend
        run: |
          npm ci
      - name: Install Playwright chromium
        working-directory: frontend
        run: |
          npx playwright install chromium --with-deps
      - name: Build frontend
        working-directory: frontend
        run: |
          npm run build
      - name: Upload Sentry source maps
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: frontend
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          npm install @sentry/cli --save-dev
          npx sentry-cli sourcemaps inject .next
          npx sentry-cli sourcemaps upload .next
      - name: Run E2E tests
        if: github.event_name == 'pull_request'
        working-directory: frontend
        run: |
          npx playwright test --reporter=html
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14
      - name: Health check
        run: |
          curl -sf http://localhost:3000/api/health || echo "Health check skipped (no running server)"
        continue-on-error: true

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
